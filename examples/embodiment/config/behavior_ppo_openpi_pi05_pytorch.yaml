defaults:
  - env/behavior_r1pro@env.train
  - env/behavior_r1pro@env.eval
  - model/pi0_5_pytorch@actor.model
  - hybrid_engines/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    rollout: 0-1
    env: 2-3
    actor: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "behavior_ppo_openpi05_pytorch"
    logger_backends: ["tensorboard"]

  only_eval: False

  max_epochs: 1000
  max_steps: -1

  val_check_interval: -1
  save_interval: 40
  seq_length: 4096
  max_prompt_length: 50

  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level

  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.28
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  reward_coef: 10.0

env:
  group_name: "EnvGroup"

  train:
    rollout_epoch: 2
    total_num_envs: 8
    max_episode_steps: 4096
    max_steps_per_rollout_epoch: 4096
    reward_coef: ${algorithm.reward_coef}
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/train
      fps: 15
    num_env_subprocess: 2
    enable_offload: True
    enable_init_offload: False
  eval:
    rollout_epoch: 2
    total_num_envs: 8
    max_episode_steps: 4096
    max_steps_per_rollout_epoch: 4096
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval
      fps: 15
    num_env_subprocess: 2

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: True
  pipeline_stage_num: 1

  model:
    # NEW-format pytorch SFT checkpoint (model.safetensors). The value head is
    # added fresh (add_value_head: True) on top of these weights.
    model_path: "/path/to/pi05_sft_pytorch_new"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 4
  global_batch_size: 64
  seed: 1234
  enable_offload: True

  model:
    model_path: ${rollout.model.model_path}
    # actor_critic loss requires a value head (validate_embodied_cfg asserts this).
    add_value_head: True
    num_images_in_input: 3
    proprio_dim: 32
    action_dim: 23
    num_action_chunks: 32
    # Flow-matching denoise steps (RL SDE chain length).
    num_steps: 8
    openpi:
      # Selects the RL variant (chain-collecting SDE sampler + VLM value head).
      task: rl
      # config_name + all shape fields are inherited from model/pi0_5_pytorch.
      # VLM-pooled value head over the paligemma prefix — the only combination the
      # pytorch RL port supports (value_after_vlm=False raises NotImplementedError).
      value_after_vlm: True
      value_vlm_mode: "mean_token"
      detach_critic_input: True
      joint_logprob: False
      ignore_last: True
      noise_level: 0.4
      noise_method: "flow_sde"
      # Freeze the paligemma VLM (SigLIP + gemma expert-0); PPO backward only
      # updates the action expert + projections + value head.
      train_expert_only: True

  optim:
    lr: 5.0e-6
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-08
    clip_grad: 1.0
    weight_decay: 0.01
    critic_warmup_steps: 0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "shard_grad_op"
    # train_expert_only freezes the VLM, so the flat param group mixes frozen +
    # trainable tensors — FSDP requires use_orig_params=True to wrap that (the
    # default False rejects non-uniform requires_grad).
    use_orig_params: True
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
